{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Toevoegen event{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="card">
    <form method="post">
      <p>
        <label for="description">Omschrijving</label>
        <input id="description" type="text" name="description" placeholder="Omschrijving" required />
      </p>
      <p>
        <label for="date">Datum</label>
        <input id="date" type="date" name="date" required />
      </p>
      {% if error %}
        <p class="alert alert-warning">{{ error }}</p>
      {% endif %}
      <p class="actions">
        <button class="btn btn-primary" type="submit">Opslaan</button>
        <a class="btn btn-secondary" href="{{ url_for('events.index') }}">Annuleren</a>
      </p>
    </form>
  </div>
{% endblock %}
