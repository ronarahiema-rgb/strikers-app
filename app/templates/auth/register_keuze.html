{% extends "base.html" %}

{% block title %}BrainBoost – Registreren{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style_login.css') }}">
{% endblock %}

{% block content %}
  <div class="card">

    <h1>Welkom bij BrainBoost</h1>
    <p class="subtitle">Wie ben jij?</p>

    <div class="form-group">
      <a href="{{ url_for('main.register_leerling') }}" class="btn" style="display:block; margin-bottom: 10px;">
        Ik ben een leerling
      </a>
    </div>

    <div class="form-group">
      <a href="{{ url_for('main.register_docent') }}" class="btn" style="display:block; margin-bottom: 10px;">
        Ik ben een docent
      </a>
    </div>

    <div class="form-group">
      <a href="{{ url_for('main.register_ouder') }}" class="btn" style="display:block; margin-bottom: 10px;">
        Ik ben een ouder
      </a>
    </div>

    <p class="info-text">
      Al een account? <a href="{{ url_for('main.login') }}" class="btn-register">Log hier in</a>
    </p>

  </div>
{% endblock %}
